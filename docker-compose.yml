services:
  fabhome:
    build: .
    container_name: fabhome
    ports:
      - "${FABHOME_PORT:-3001}:3000"
    volumes:
      - ./data:/app/data
      - ./icons:/app/static/icons
    restart: unless-stopped
    environment:
      FLASK_DEBUG: "0"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    mem_limit: 256m
